<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>K3 L1: Career Dreamer</title>
    <style>
        body { font-family: 'Comic Sans MS', sans-serif; text-align: center; background: #e0f7fa; }
        .game-board { margin: 30px auto; width: 85%; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        #career-img { height: 250px; margin-bottom: 20px; }
        .drop-zone { border: 3px dashed #ff9800; width: 150px; height: 50px; display: inline-block; vertical-align: middle; line-height: 50px; font-size: 24px; border-radius: 10px; background-color: #fff9c4; }
        .word-item { padding: 10px 20px; margin: 8px; background: #4caf50; color: white; border-radius: 10px; cursor: grab; display: inline-block; font-size: 20px; }
    </style>
</head>
<body>

    <h1>Career Dreamer - K3 L1</h1>
    <div class="game-board">
        <img id="career-img" src="images/teacher.png" alt="Career">
        <div id="question-text" style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">What do you want to be?</div>
        <div style="font-size: 28px;">
            I want to be <span id="article">a</span> <span class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)">...</span>.
        </div>
        <div id="word-bank" style="margin-top: 20px;">
            <div class="word-item" draggable="true" ondragstart="drag(event)" id="teacher">teacher</div>
            <div class="word-item" draggable="true" ondragstart="drag(event)" id="pilot">pilot</div>
            <div class="word-item" draggable="true" ondragstart="drag(event)" id="engineer">engineer</div>
            <div class="word-item" draggable="true" ondragstart="drag(event)" id="chef">chef</div>
            <div class="word-item" draggable="true" ondragstart="drag(event)" id="ballerina">ballerina</div>
            <div class="word-item" draggable="true" ondragstart="drag(event)" id="doctor">doctor</div>
            <div class="word-item" draggable="true" ondragstart="drag(event)" id="firefighter">firefighter</div>
            <div class="word-item" draggable="true" ondragstart="drag(event)" id="astronaut">astronaut</div>
            <div class="word-item" draggable="true" ondragstart="drag(event)" id="nurse">nurse</div>
        </div>
    </div>

    <script>
        const jobList = [
            {name: "teacher", img: "images/teacher.png"},
            {name: "pilot", img: "images/pilot.png"},
            {name: "engineer", img: "images/engineer.png"},
            {name: "chef", img: "images/chef.png"},
            {name: "ballerina", img: "images/ballerina.png"},
            {name: "doctor", img: "images/doctor.png"},
            {name: "firefighter", img: "images/firefighter.png"},
            {name: "astronaut", img: "images/astronaut.png"},
            {name: "nurse", img: "images/nurse.png"}
        ];
        let currentIdx = 0;

        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        
        function drop(ev) {
            ev.preventDefault();
            var job = ev.dataTransfer.getData("text");
            if(job === jobList[currentIdx].name) {
                ev.target.innerText = job;
                // 語音流程：先說問句，再說答句
                let qMsg = new SpeechSynthesisUtterance("What do you want to be?");
                window.speechSynthesis.speak(qMsg);
                
                setTimeout(() => {
                    let article = (['a','e','i','o','u'].includes(job[0])) ? "an" : "a";
                    let aMsg = new SpeechSynthesisUtterance("I want to be " + article + " " + job);
                    window.speechSynthesis.speak(aMsg);
                }, 1500);
                
                setTimeout(() => {
                    currentIdx = (currentIdx + 1) % jobList.length;
                    document.getElementById('career-img').src = jobList[currentIdx].img;
                    document.getElementById('article').innerText = (['a','e','i','o','u'].includes(jobList[currentIdx].name[0])) ? "an" : "a";
                    ev.target.innerText = "...";
                }, 3500);
            }
        }
    </script>
</body>
</html>
